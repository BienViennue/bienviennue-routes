<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Routes BienViennue</title>
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 1em;
    background: #f7f9fb;
    color: #222;
  }
  h1 {
    color: #5BA9C2;
    margin-bottom: 0.5em;
  }
  .language-select {
    margin-bottom: 1em;
  }
  select {
    font-size: 1em;
    padding: 0.3em;
    border-radius: 5px;
    border: 1px solid #5BA9C2;
    background: white;
    color: #115577;
    cursor: pointer;
    margin-right: 1em;
  }
  .filters {
    margin-bottom: 1em;
  }
  label {
    margin-right: 0.3em;
    font-weight: bold;
  }
  ul.route-list {
    list-style: none;
    padding-left: 0;
    border-top: 1px solid #ddd;
  }
  ul.route-list li {
    padding: 0.6em 0.3em;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
    color: #115577;
  }
  ul.route-list li:hover,
  ul.route-list li:focus {
    background: #d0e8fa;
    outline: none;
  }
  /* Modal popup */
  #modal {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
  }
  #modal-content {
    background: white;
    max-width: 400px;
    margin: 7% auto;
    padding: 1.5em;
    border-radius: 10px;
    position: relative;
    text-align: center;
  }
  #modal-close {
    position: absolute;
    right: 1em; top: 1em;
    cursor: pointer;
    font-size: 1.6em;
    font-weight: bold;
    color: #555;
    background: none;
    border: none;
  }
  #modal-title {
    margin-bottom: 1em;
    font-size: 1.25em;
    color: #5BA9C2;
  }
  #download-links a {
    display: inline-block;
    margin: 0.5em 1em;
    text-decoration: none;
    background: #5BA9C2;
    color: white;
    padding: 0.5em 1em;
    border-radius: 6px;
  }
  #download-links a:hover {
    background: #4a8cae;
  }
  @media(max-width: 480px) {
    #modal-content {
      width: 90%;
      margin: 15% auto;
    }
    select {
      margin-bottom: 0.7em;
      width: 100%;
    }
  }
</style>
</head>
<body>

<h1 id="page-title">Routes BienViennue</h1>

<div class="language-select">
  <label for="language-select">Selecteer taal:</label>
  <select id="language-select" aria-label="Language selector">
    <option value="nl">Nederlands</option>
    <option value="en">English</option>
    <option value="fr">Français</option>
  </select>
</div>

<div class="filters" aria-label="Filter routes">
  <label for="filter-activity">Activiteit:</label>
  <select id="filter-activity">
    <option value="all">Alle</option>
    <option value="walking">Wandelen</option>
    <option value="biking">Fietsen</option>
    <option value="mountainbiking">Mountainbiken</option>
    <option value="kayak">Kajakken</option>
  </select>

  <label for="filter-duration">Duur:</label>
  <select id="filter-duration">
    <option value="all">Alle</option>
    <option value="less2">Minder dan 2 uur</option>
    <option value="2to3">2 tot 3 uur</option>
    <option value="more3">Meer dan 3 uur</option>
  </select>

  <label for="filter-region">Regio:</label>
  <select id="filter-region">
    <option value="all">Alle</option>
  </select>

  <label for="filter-distance">Afstand:</label>
  <select id="filter-distance">
    <option value="all">Alle</option>
    <option value="0-5">Minder dan 5 km</option>
    <option value="5-10">5 tot 10 km</option>
    <option value="10-15">10 tot 15 km</option>
    <option value="15-20">15 tot 20 km</option>
    <option value="20-25">20 tot 25 km</option>
    <option value="25-30">25 tot 30 km</option>
    <option value="30-40">30 tot 40 km</option>
    <option value="40-50">40 tot 50 km</option>
    <option value="50+">Meer dan 50 km</option>
  </select>
</div>

<ul id="route-list" class="route-list" tabindex="0" aria-label="Lijst met routes"></ul>

<!-- Modal -->
<div id="modal" aria-hidden="true" role="dialog" aria-labelledby="modal-title" tabindex="-1">
  <div id="modal-content">
    <button id="modal-close" aria-label="Sluit popup">&times;</button>
    <div id="modal-title"></div>
    <div id="download-links"></div>
  </div>
</div>

<script>
// Meertalige teksten
const texts = {
  nl: {
    pageTitle: "Routes BienViennue",
    filter: {
      activity: "Activiteit:",
      duration: "Duur:",
      region: "Regio:",
      distance: "Afstand:",
      all: "Alle",
      activities: {
        walking: "Wandelen",
        biking: "Fietsen",
        mountainbiking: "Mountainbiken",
        kayak: "Kajakken",
      },
      durations: {
        less2: "Minder dan 2 uur",
        "2to3": "2 tot 3 uur",
        more3: "Meer dan 3 uur",
      },
    },
    noRoutesFound: "Geen routes gevonden.",
    downloadGPX: "Download GPX",
    downloadPDF: "Download PDF",
    closePopup: "Sluit popup",
  },
  en: {
    pageTitle: "Routes BienViennue",
    filter: {
      activity: "Activity:",
      duration: "Duration:",
      region: "Region:",
      distance: "Distance:",
      all: "All",
      activities: {
        walking: "Walking",
        biking: "Biking",
        mountainbiking: "Mountainbiking",
        kayak: "Kayaking",
      },
      durations: {
        less2: "Less than 2 hours",
        "2to3": "2 to 3 hours",
        more3: "More than 3 hours",
      },
    },
    noRoutesFound: "No routes found.",
    downloadGPX: "Download GPX",
    downloadPDF: "Download PDF",
    closePopup: "Close popup",
  },
  fr: {
    pageTitle: "Itinéraires BienViennue",
    filter: {
      activity: "Activité :",
      duration: "Durée :",
      region: "Région :",
      distance: "Distance :",
      all: "Tous",
      activities: {
        walking: "Marche",
        biking: "Vélo",
        mountainbiking: "VTT",
        kayak: "Kayak",
      },
      durations: {
        less2: "Moins de 2 heures",
        "2to3": "2 à 3 heures",
        more3: "Plus de 3 heures",
      },
    },
    noRoutesFound: "Aucun itinéraire trouvé.",
    downloadGPX: "Télécharger GPX",
    downloadPDF: "Télécharger PDF",
    closePopup: "Fermer popup",
  },
};

// Routes data
const routes = [
  {
    id: "r1",
    naam: {
      nl: "Au cœur du Ridellois – Azay-le-Rideau 1,6 km",
      en: "Au cœur du Ridellois – Azay-le-Rideau 1.6 km",
      fr: "Au cœur du Ridellois – Azay-le-Rideau 1,6 km",
    },
    activiteit: ["walking", "biking", "mountainbiking"],
    duur: "less2", // less2, 2to3, more3
    regio: "Région Azay-le-Rideau",
    afstand: 1.6,
    gpxUrl: "routes/Au%20c%C5%93ur%20du%20Ridellois%20%E2%80%93%20Azay-le-Rideau%201%2C6%20km.gpx",
    pdfUrl: "routes/Au%20c%C5%93ur%20du%20Ridellois%20%E2%80%93%20Azay-le-Rideau%201%2C6%20km.pdf",
  },
];

// Helpers
function getUniqueRegions() {
  const regioSet = new Set();
  routes.forEach((r) => {
    if (r.regio) regioSet.add(r.regio);
  });
  return Array.from(regioSet).sort();
}

// Elements
const languageSelect = document.getElementById("language-select");
const pageTitle = document.getElementById("page-title");

const filterActivity = document.getElementById("filter-activity");
const filterDuration = document.getElementById("filter-duration");
const filterRegion = document.getElementById("filter-region");
const filterDistance = document.getElementById("filter-distance");

const routeList = document.getElementById("route-list");

const modal = document.getElementById("modal");
const modalClose = document.getElementById("modal-close");
const modalTitle = document.getElementById("modal-title");
const downloadLinks = document.getElementById("download-links");

let currentLanguage = languageSelect.value;

// Translate UI
function translateUI() {
  const t = texts[currentLanguage];

  pageTitle.textContent = t.pageTitle;
  document.querySelector('label[for="language-select"]').textContent = t.filter.activity;
  document.querySelector('label[for="filter-activity"]').textContent = t.filter.activity;
  document.querySelector('label[for="filter-duration"]').textContent = t.filter.duration;
  document.querySelector('label[for="filter-region"]').textContent = t.filter.region;
  document.querySelector('label[for="filter-distance"]').textContent = t.filter.distance;

  // Fill filter select options
  filterActivity.options[0].text = t.filter.all;
  filterDuration.options[0].text = t.filter.all;
  filterRegion.options[0].text = t.filter.all;
  filterDistance.options[0].text = t.filter.all;

  // Fill activity options translation
  ["walking", "biking", "mountainbiking", "kayak"].forEach((act) => {
    const opt = filterActivity.querySelector(`option[value="${act}"]`);
    if (opt) opt.text = t.filter.activities[act];
  });

  // Fill duration options translation
  ["less2", "2to3", "more3"].forEach((dur) => {
    const opt = filterDuration.querySelector(`option[value="${dur}"]`);
    if (opt) opt.text = t.filter.durations[dur];
  });

  // Fill region options dynamically
  const regions = getUniqueRegions();
  filterRegion.innerHTML = "";
  filterRegion.appendChild(new Option(t.filter.all, "all"));
  regions.forEach((r) => {
    filterRegion.appendChild(new Option(r, r));
  });
}

// Filter routes and fill list
function filterRoutes() {
  routeList.innerHTML = "";
  const t = texts[currentLanguage];

  const fActivity = filterActivity.value;
  const fDuration = filterDuration.value;
  const fRegion = filterRegion.value;
  const fDistance = filterDistance.value;

  const filtered = routes.filter((r) => {
    const matchActivity = fActivity === "all" || r.activiteit.includes(fActivity);
    const matchDuration = fDuration === "all" || r.duur === fDuration;
    const matchRegion = fRegion === "all" || r.regio === fRegion;

    let matchDistance = true;
    if (fDistance !== "all" && r.afstand != null) {
      const d = r.afstand;
      switch (fDistance) {
        case "0-5":
          matchDistance = d < 5;
          break;
        case "5-10":
          matchDistance = d >= 5 && d < 10;
          break;
        case "10-15":
          matchDistance = d >= 10 && d < 15;
          break;
        case "15-20":
          matchDistance = d >= 15 && d < 20;
          break;
        case "20-25":
          matchDistance = d >= 20 && d < 25;
          break;
        case "25-30":
          matchDistance = d >= 25 && d < 30;
          break;
        case "30-40":
          matchDistance = d >= 30 && d < 40;
          break;
        case "40-50":
          matchDistance = d >= 40 && d < 50;
          break;
        case "50+":
          matchDistance = d >= 50;
          break;
      }
    }

    return matchActivity && matchDuration && matchRegion && matchDistance;
  });

  if (filtered.length === 0) {
    const li = document.createElement("li");
    li.textContent = t.noRoutesFound;
    li.style.fontStyle = "italic";
    routeList.appendChild(li);
    return;
  }

  filtered.forEach((route) => {
    const li = document.createElement("li");
    li.textContent = route.naam[currentLanguage] || route.naam.nl || "Unnamed route";
    li.tabIndex = 0;
    li.setAttribute("role", "button");
    li.style.outline = "none";
    li.addEventListener("click", () => openModal(route));
    li.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") openModal(route);
    });
    routeList.appendChild(li);
  });
}

// Modal open
function openModal(route) {
  modal.style.display = "block";
  modal.setAttribute("aria-hidden", "false");
  modal.focus();

  modalTitle.textContent = route.naam[currentLanguage] || route.naam.nl || "Unnamed route";

  downloadLinks.innerHTML = "";
  const t = texts[currentLanguage];

  const gpxLink = document.createElement("a");
  gpxLink.href = route.gpxUrl;
  gpxLink.textContent = t.downloadGPX;
  gpxLink.download = "";
  gpxLink.target = "_blank";
  downloadLinks.appendChild(gpxLink);

  const pdfLink = document.createElement("a");
  pdfLink.href = route.pdfUrl;
  pdfLink.textContent = t.downloadPDF;
  pdfLink.download = "";
  pdfLink.target = "_blank";
  downloadLinks.appendChild(pdfLink);
}

// Modal close
document.getElementById("modal-close").onclick = closeModal;
modal.onclick = (e) => {
  if (e.target === modal) closeModal();
};
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});
function closeModal() {
  modal.style.display = "none";
  modal.setAttribute("aria-hidden", "true");
}

// Event listeners for filters and language
languageSelect.addEventListener("change", () => {
  currentLanguage = languageSelect.value;
  translateUI();
  filterRoutes();
});
filterActivity.addEventListener("change", filterRoutes);
filterDuration.addEventListener("change", filterRoutes);
filterRegion.addEventListener("change", filterRoutes);
filterDistance.addEventListener("change", filterRoutes);

// Init
translateUI();
filterRoutes();

</script>
</body>
</html>
