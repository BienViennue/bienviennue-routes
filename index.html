<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Routes BienViennue</title>
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<style>
  /* Jouw CSS blijft hetzelfde, hier ter beknoptheid niet gekopieerd */
  body { font-family: Arial, sans-serif; margin: 1em; background: #f7f9fb; color: #222; }
  h1 { color: #5BA9C2; margin-bottom: 0.2em; }
  .language-select { margin-bottom: 1em; }
  select { font-size: 1em; padding: 0.3em; border-radius: 5px; border: 1px solid #5BA9C2; background: white; color: #115577; cursor: pointer; }
  .filters { margin-bottom: 1em; }
  label { margin-right: 0.5em; }
  select { margin-right: 1.5em; }
  ul.route-list { list-style: none; padding-left: 0; }
  ul.route-list li { padding: 0.6em 0.3em; border-bottom: 1px solid #ddd; cursor: pointer; color: #115577; }
  ul.route-list li:hover, ul.route-list li:focus { background: #d0e8fa; outline: none; }
  #modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
  #modal-content { background: white; max-width: 600px; margin: 5% auto; padding: 1em 1.5em 1.5em; border-radius: 10px; position: relative; }
  #modal-close { position: absolute; right: 1em; top: 1em; cursor: pointer; font-size: 1.4em; font-weight: bold; color: #555; background: none; border: none; }
  #map { height: 300px; margin-top: 0.5em; border-radius: 6px; }
  .download-links { margin-top: 1em; }
  .download-links a { display: inline-block; margin-right: 1em; text-decoration: none; background: #5BA9C2; color: white; padding: 0.5em 1em; border-radius: 6px; }
  .download-links a:hover { background: #4a8cae; }
  .extra-info { margin-top: 1em; font-size: 0.9em; color: #444; }
  @media(max-width: 640px) {
    #modal-content { width: 95%; margin: 10% auto; }
    select { margin-bottom: 0.7em; width: 100%; }
  }
</style>
</head>
<body>
  <h1 data-i18n="title">Routes BienViennue</h1>

  <div class="language-select">
    <label for="language-select" data-i18n="selectLanguage">Selecteer taal:</label>
    <select id="language-select" aria-label="Language selector">
      <option value="nl">Nederlands</option>
      <option value="en">English</option>
      <option value="fr">Français</option>
    </select>
  </div>

  <div class="filters" aria-label="Filter routes">
    <!-- Filters blijven hetzelfde -->
  </div>

  <ul class="route-list" id="route-list" tabindex="0" aria-label="Lijst met routes"></ul>

  <!-- Modal -->
  <div id="modal" aria-hidden="true" role="dialog" aria-labelledby="modalTitle" tabindex="-1">
    <div id="modal-content">
      <button id="modal-close" aria-label="Close popup">&times;</button>
      <h2 id="modalTitle"></h2>
      <div id="map"></div>
      <div class="download-links" id="downloadLinks"></div>
      <div class="extra-info" id="extraInfo"></div>
    </div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tmcw/togeojson@0.16.0/togeojson.min.js"></script>

<script>
// Vertalingen blijven hetzelfde

// Routes data met jouw correcte URLs:
const routes = [
  {
    id: 'r1',
    naam: {
      nl: 'Au cœur du Ridellois – Azay-le-Rideau 1,6 km',
      en: 'Au cœur du Ridellois – Azay-le-Rideau 1.6 km',
      fr: 'Au cœur du Ridellois – Azay-le-Rideau 1,6 km'
    },
    type: ['walking', 'biking', 'mountainbiking'],
    duur: 'Less than 2 hours',
    regio: 'Région Azay-le-Rideau',
    afstand: 1.6,
    gpxUrl: 'https://bienviennue.github.io/routes/Au%20c%C5%93ur%20du%20Ridellois%20%E2%80%93%20Azay-le-Rideau%201%2C6%20km.gpx',
    pdfUrl: 'https://bienviennue.github.io/routes/Au%20c%C5%93ur%20du%20Ridellois%20%E2%80%93%20Azay-le-Rideau%201%2C6%20km.pdf',
    gpxFilename: 'Au cœur du Ridellois – Azay-le-Rideau 1,6 km.gpx',
    pdfFilename: 'Au cœur du Ridellois – Azay-le-Rideau 1,6 km.pdf',
    beschrijving: {
      nl: 'Mooie route langs de rivier.',
      en: 'Nice route along the river.',
      fr: 'Belle balade le long de la rivière.'
    }
  }
];

// Helpers en elementen blijven hetzelfde

// … (vertaalInterface, vulRouteList, closeModal etc blijven zoals in jouw code)

// Open modal functie, aangepast met betere laagverwijdering en extra console output:

function openModal(route) {
  modal.style.display = 'block';
  modal.setAttribute('aria-hidden', 'false');
  modal.focus();
  modalTitle.textContent = route.naam[currentLanguage] || route.naam.nl || 'Unnamed route';
  extraInfo.textContent = route.beschrijving[currentLanguage] || '';

  downloadLinks.innerHTML = '';
  const t = translations[currentLanguage];
  if (route.gpxUrl) {
    const a1 = document.createElement('a');
    a1.href = route.gpxUrl;
    a1.download = route.gpxFilename || '';
    a1.textContent = t.downloadGPX;
    a1.target = '_blank';
    downloadLinks.appendChild(a1);
  }
  if (route.pdfUrl) {
    const a2 = document.createElement('a');
    a2.href = route.pdfUrl;
    a2.download = route.pdfFilename || '';
    a2.textContent = t.downloadPDF;
    a2.target = '_blank';
    downloadLinks.appendChild(a2);
  }

  setTimeout(() => {
    if (!map) {
      map = L.map('map').setView([47.2, 0.2], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 18,
      }).addTo(map);
    }
    // Verwijder bestaande gpxLayer netjes
    if (gpxLayer) {
      map.removeLayer(gpxLayer);
      gpxLayer = null;
    }

    // Fetch GPX bestand
    fetch(route.gpxUrl)
      .then(r => {
        console.log('Fetch response status:', r.status);
        if (!r.ok) throw new Error(`HTTP status ${r.status}`);
        return r.text();
      })
      .then(gpxText => {
        console.log('GPX text length:', gpxText.length);
        const parser = new DOMParser();
        const gpxDoc = parser.parseFromString(gpxText, 'application/xml');
        const geojson = toGeoJSON.gpx(gpxDoc);
        console.log('GeoJSON object:', geojson);
        gpxLayer = L.geoJSON(geojson).addTo(map);
        map.fitBounds(gpxLayer.getBounds());
      })
      .catch((err) => {
        console.error('Error loading GPX:', err);
        alert(t.gpxLoadError);
      });
  }, 200);
}

// Event handlers en init code blijven ongewijzigd

// Sluiten modal
modalClose.onclick = closeModal;
modal.onclick = e => { if(e.target === modal) closeModal(); };
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

// Taalkeuze handler
taalSelect.addEventListener('change', e => {
  currentLanguage = e.target.value;
  vertaalInterface();
  vulRouteList();
});

// Filters
filterActivity.addEventListener('change', vulRouteList);
filterDuration.addEventListener('change', vulRouteList);
filterRegion.addEventListener('change', vulRouteList);
filterDistance.addEventListener('change', vulRouteList);

// Init
vertaalInterface();
vulRouteList();

</script>
</body>
</html>
